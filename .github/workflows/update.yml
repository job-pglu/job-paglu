name: Update Linktree data and deploy

on:
  schedule:
    # Every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

# Least-privilege by default; elevated where actually needed.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data:
    name: Scrape + commit data
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        # Never let a scrape failure fail the whole workflow: the script
        # already leaves previous data untouched on error, and Pages should
        # keep serving the last known-good build. GITHUB_TOKEN authenticates
        # the GitHub user API call so it isn't hit by the 60/hour cap that
        # unauthenticated requests share across all Actions runners.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run scrape || echo "::warning::Scrape failed, keeping previous data/profile.json"

      - name: Check for changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/profile.json index.html robots.txt sitemap.xml
          git commit -m "chore: auto-update Linktree data [skip ci]"
          git push

  deploy:
    name: Deploy to GitHub Pages
    needs: update-data
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
